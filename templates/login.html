<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | {{ cms.header_title }}</title>
    <style>
        :root {
            --bg: {{ cms.background_color or '#0A0E27' }};
            --glass: {{ cms.glass_bg or 'rgba(10,14,39,0.75)' }};
            --primary: {{ cms.primary_color or '#00F0FF' }};
            --secondary: {{ cms.secondary_color or '#FF00C8' }};
            --text: {{ cms.text_color or '#FFFFFF' }};
            --muted: {{ cms.muted_text or '#A0AEC0' }};
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: {{ cms.font_family or 'Inter, sans-serif' }};
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(circle at 30% 30%, rgba(0,240,255,0.15) 0%, transparent 50%),
                              radial-gradient(circle at 70% 70%, rgba(255,0,200,0.15) 0%, transparent 50%);
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }
        .login-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
        }
        .login-card img {
            max-height: 60px;
            margin-bottom: 1rem;
        }
        h1 {
            color: var(--primary);
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }
        p.subtitle {
            color: var(--muted);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        label {
            display: block;
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 0.5rem;
            letter-spacing: 0.5px;
        }
        input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s;
            /* Fixes the unclickable input bug on mobile WebKit browsers */
            position: relative;
            z-index: 10;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0,240,255,0.3);
        }
        button {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            color: #0A0E27;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            letter-spacing: 0.5px;
        }
        button:hover {
            transform: translateY(-1px);
            filter: brightness(1.15);
        }
        .error {
            color: #FF0055;
            font-size: 0.85rem;
            margin-top: 0.75rem;
        }
        .login-footer {
            margin-top: 1.5rem;
            color: var(--muted);
            font-size: 0.8rem;
        }
        .login-footer a {
            color: var(--primary);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            {% if cms.logo_url %}
            <img src="{{ cms.logo_url }}" alt="Logo">
            {% endif %}
            <h1>{{ cms.header_title }}</h1>
            <p class="subtitle">{{ cms.header_subtitle or 'Sign in to your account' }}</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="username" autocorrect="off" autocapitalize="none" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
                </div>
                <button type="submit">Sign In</button>
                <div class="error" id="errorMsg"></div>
            </form>
            
            <div class="login-footer">
                <p>Authorized users only. No sign-up available.</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('errorMsg');
            
            if (!username || !password) {
                errorEl.textContent = 'Username and password are required.';
                return;
            }
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                
                if (!res.ok) {
                    errorEl.textContent = data.error || 'Login failed.';
                    return;
                }
                
                // Redirect based on role
                if (data.role === 'admin') {
                    window.location.href = '/admin';
                } else {
                    window.location.href = '/dashboard';
                }
            } catch (err) {
                errorEl.textContent = 'Network error. Please try again.';
            }
        });
    </script>
</body>
</html>
